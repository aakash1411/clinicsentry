version: "0.1.0"

phi_firewall:
  mode: REDACT
  use_presidio: false
  decode_encoded: true
  max_depth: 64
  overrides:
    DATE: GENERALIZE
    ZIP: GENERALIZE

escalation:
  thresholds:
    informational: 0.6
    advisory: 0.8
  on_unregistered_action: escalate

audit:
  backend: memory
  retention_years: 7

meddevice_mode:
  enabled: true
  software_safety_class: B
  device_type: closed_loop_drug_delivery
  intended_use: "AI agent provides dosage recommendations reviewed by a clinician"
  manufacturer: "Acme Medical Devices Inc."
  strict_dose_ranges: true
  dose_ranges:
    - parameter: basal_rate_u_per_hr
      min: 0.0
      max: 5.0
      unit: U/hr
  rate_limit_per_hour: 6
