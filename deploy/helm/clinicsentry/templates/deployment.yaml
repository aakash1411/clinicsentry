apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clinicsentry.fullname" . }}
  labels: {{- include "clinicsentry.labels" . | nindent 4 }}
spec:
  replicas: {{ if .Values.autoscaling.enabled }}null{{ else }}{{ .Values.replicaCount }}{{ end }}
  selector:
    matchLabels: {{- include "clinicsentry.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "clinicsentry.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: clinicsentry
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.externalSecrets.enabled }}
            {{- range .Values.externalSecrets.remoteRefs }}
            - name: {{ .secretKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.name }}
                  key: {{ .secretKey }}
            {{- end }}
            {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz/chain
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz/chain
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
